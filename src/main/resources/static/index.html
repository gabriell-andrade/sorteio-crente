<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador UMADEB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <div class="topo">
        <img src="images/logo.png" class="logo">
        <h1>Sorteador UMADEB</h1>
    </div>

    <div class="conteudo">

        <span id="contador"></span>

        <p class="descricao">Digite os nomes separados por vírgula</p>

        <div class="campo-nomes">
            <textarea
                    id="nomes"
                    rows="3"
                    placeholder="Ex: Gabriel, Karla, Ricardo"
                    oninput="autoResize(this); atualizarContador()"
            ></textarea>

        </div>

        <button id="btnSortear" onclick="sortear()">Sortear</button>

        <h2 id="resultado"></h2>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
