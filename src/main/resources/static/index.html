<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sorteador UMADEB</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container">

    <header class="topo">
        <img src="images/logo.png" alt="Logo UMADEB" class="logo">
        <h1>Sorteador UMADEB</h1>
    </header>

    <section class="conteudo">

        <span id="contador"></span>

        <p class="descricao">
            Digite os nomes separados por vírgula
        </p>

        <div class="campo-nomes">
                <textarea
                        id="nomes"
                        rows="3"
                        placeholder="Ex: Gabriel, Karla, Ricardo"
                        oninput="autoResize(this); atualizarContador()"
                ></textarea>
        </div>

        <div class="acoes">
            <button id="btnListas" type="button" onclick="abrirModal()">
                Participantes
            </button>

            <button id="btnLimpar" type="button" onclick="limparNomes()" class="btn-secundario">
                Limpar
            </button>
        </div>

        <button id="btnSortear" type="button" onclick="sortear()">
            Sortear
        </button>

        <h2 id="resultado"></h2>

    </section>

</main>

<div id="modal" class="modal">
    <div class="modal-content">

        <div class="modal-header">
            <h3>Participantes</h3>
            <button id="btnEditarModo" onclick="toggleModoEdicao()">Editar</button>
        </div>

        <div id="participantes"></div>

        <div class="adicionar">
            <input
                    type="text"
                    id="novoParticipante"
                    placeholder="Nome do participante"
            >
            <button type="button" onclick="adicionarParticipante()">
                Adicionar
            </button>
        </div>

        <div class="acoes-modal">

            <div class="linha-botoes">
                <button onclick="adicionarAoSorteio()">Adicionar ao Sorteio</button>
                <button onclick="fecharModal()" class="btn-secundario">Sair</button>
            </div>

        </div>

    </div>
</div>

<script src="script.js"></script>
</body>
</html>
